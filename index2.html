<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoE-ACT Project Page</title>
    <style>
        /* 简约专业学术风格 */
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px;
        }

        h1 {
            font-size: 3rem;
            color: #003399;
            /* 专业深蓝色 */
            margin-bottom: 20px;
            font-weight: 800;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #555;
            line-height: 1.5;
            margin-bottom: 60px;
            font-weight: 400;
        }

        .coming-soon-badge {
            display: inline-block;
            padding: 12px 35px;
            border: 2px solid #003399;
            border-radius: 50px;
            color: #003399;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.1rem;
            animation: breathe 2.5s infinite ease-in-out;
        }

        /* 呼吸灯动画效果 */
        @keyframes breathe {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.98);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .footer {
            margin-top: 80px;
            font-size: 0.9rem;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>MoE-ACT</h1>
        <p class="subtitle">
            Scaling Multi-Task Bimanual Manipulation with Sparse Language-Conditioned Mixture-of-Experts Transformers
        </p>

        <div class="coming-soon-badge">
            Coming Soon
        </div>

        <div class="footer">
            © 2026 MoE-ACT Project Team.
        </div>
    </div>

</body>

</html>
